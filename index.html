<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para alguien especial</title>
    <style>
        body {
            background-color: #fdf2f2;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #5a1a1a;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 350px;
            width: 90%;
        }
        h1 { font-size: 24px; color: #d63384; margin-bottom: 20px; }
        p { line-height: 1.6; font-style: italic; font-size: 18px; margin-bottom: 30px; }
        .heart { color: #e74c3c; font-size: 50px; animation: beat 1.2s infinite; margin-bottom: 10px; }
        
        /* Estilo para el reproductor de audio */
        audio {
            width: 100%;
            margin-top: 10px;
            filter: sepia(20%) saturate(70%) grayscale(100%) contrast(90%) invert(12%); /* Esto le da un toque elegante */
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="heart">❤</div>
    <h1>Para ti...</h1>
    <p>"¿Cuánto me cuesta que me quieras un poquito?<br>
    ¿Cuánto me cuesta ser el dueño de tus besos?"</p>
    
    <audio controls>
        <source src="musica.mp3" type="audio/mpeg">
        Tu navegador no soporta este elemento de audio.
    </audio>
    
    <p style="font-size: 13px; color: #888; margin-top: 25px; font-style: normal;">
        Dale play y escucha lo que te quiero decir.
    </p>
</div>

</body>
</html>
